name: Publish esbuild plugin
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI workflow run ID to download the workspace package artifact from'
        required: true

jobs:
  publish-esbuild-plugin:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'esbuild-plugin-v')
    permissions:
      actions: read
      contents: write
      id-token: write # Required for OIDC
    steps:
      - name: Validate version tag
        run: |
          if ! [[ "${{ github.ref_name }}" =~ ^esbuild-plugin-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: tag '${{ github.ref_name }}' does not match esbuild-plugin-vX.Y.Z format"
            exit 1
          fi
      - name: Set version
        id: version
        run: echo "value=${GITHUB_REF_NAME#esbuild-plugin-v}" >> "$GITHUB_OUTPUT"
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
      - name: Validate package version
        run: |
          package_version="$(npm pkg get version --workspace @splunk/otel-esbuild-plugin-node | tr -d '"')"
          if [[ "$package_version" != "${{ steps.version.outputs.value }}" ]]; then
            echo "Error: package version '$package_version' does not match tag version '${{ steps.version.outputs.value }}'"
            exit 1
          fi
      - name: Download workspace package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workspace-packages
          run-id: ${{ inputs.run_id }}
          github-token: ${{ github.token }}
          path: dist
      - name: Prepare release assets
        id: package
        run: |
          package_file="splunk-otel-esbuild-plugin-node-${{ steps.version.outputs.value }}.tgz"
          if [[ ! -f "dist/$package_file" ]]; then
            echo "Error: expected dist/$package_file from workspace-packages artifact"
            echo "Available files:"
            find dist -maxdepth 2 -type f -print
            exit 1
          fi

          mkdir -p release-assets
          cp "dist/$package_file" "release-assets/$package_file"
          shasum -a 256 "release-assets/$package_file" > release-assets/checksums.txt
          echo "file=$package_file" >> "$GITHUB_OUTPUT"
      - name: Generate release notes
        id: release-notes
        run: |
          node -e "
            import { getReleaseMessage } from './scripts/release-message.mjs';
            const body = getReleaseMessage('../packages/otel-esbuild-plugin');
            const fs = await import('fs');
            fs.writeFileSync('release-body.md', body);
          " --input-type=module
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --notes-file release-body.md \
            release-assets/*
      - name: Publish
        run: npm publish "./release-assets/${{ steps.package.outputs.file }}" --access public
