name: Publish
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI workflow run ID to download the package artifact from'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    permissions:
      contents: write
      id-token: write  # Required for OIDC
    steps:
      - name: Validate version tag
        run: |
          if ! [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: tag '${{ github.ref_name }}' does not match vX.Y.Z format"
            exit 1
          fi
      - name: Set version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: splunk-otel-${{ steps.version.outputs.value }}.tgz
          run-id: ${{ inputs.run_id }}
          github-token: ${{ github.token }}
          path: dist
      - name: List dist contents
        run: ls -la dist/
      - name: Generate checksums
        run: shasum -a 256 dist/* > dist/checksums.txt
      - name: Generate release notes
        id: release-notes
        run: |
          node -e "
            import { getReleaseMessage } from './scripts/release-message.mjs';
            const body = getReleaseMessage('../');
            const fs = await import('fs');
            fs.writeFileSync('release-body.md', body);
          " --input-type=module
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-body.md
          files: dist/*
      - name: Publish
        run: npm publish ./dist/splunk-otel-${{ steps.version.outputs.value }}.tgz
