name: Continuous Integration
on:
  push:
  pull_request:
permissions: read-all

env:
  # https://github.com/actions/checkout/issues/1590
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  prebuilds-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        container: ['node:18.0.0']
        node_api_target: ['18.0.0', '20.0.0', '21.2.0', '22.0.0', '23.0.0', '24.0.0']
        include:
          - container: 'node:22.0.0'
            node_api_target: '25.2.0'
          - container: 'node:22.0.0'
            node_api_target: '26.0.0'
    container: ${{ matrix.container }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Install npm dependencies
        run: npm ci --ignore-scripts --no-optional
      - name: Prebuild
        run: npm run prebuild:os ${{ matrix.node_api_target }}
      - name: upload prebuilds
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: prebuilds-linux-${{ matrix.node_api_target }}
          path: prebuilds

  prebuilds-linux-arm64:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        container: ['node:18.0.0']
        node_api_target: ['18.0.0', '20.0.0', '21.2.0', '22.0.0', '23.0.0', '24.0.0']
        include:
          - container: 'node:22.0.0'
            node_api_target: '25.2.0'
          - container: 'node:22.0.0'
            node_api_target: '26.0.0'
    container: ${{ matrix.container }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Install npm dependencies
        run: npm ci --ignore-scripts --no-optional
      - name: Prebuild
        run: npm run prebuild:os ${{ matrix.node_api_target }}
      - name: upload prebuilds
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: prebuilds-linux-arm64-${{ matrix.node_api_target }}
          path: prebuilds

  prebuilds-linux-musl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_api_target: ['18.0.0', '20.0.0', '21.2.0', '22.0.0', '23.0.0', '24.0.0', '25.2.0', '26.0.0']
    container: node:22-alpine3.20
    steps:
      - name: Install build deps
        run: apk add --no-cache python3 make g++ git
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Install npm dependencies
        run: npm ci --ignore-scripts --no-optional
      - name: Prebuild
        run: npm run prebuild:os -- --libc=musl ${{ matrix.node_api_target }}
      - name: upload prebuilds
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: prebuilds-linux-musl-${{ matrix.node_api_target }}
          path: prebuilds

  prebuilds-linux-musl-arm64:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        node_api_target: ['18.0.0', '20.0.0', '21.2.0', '22.0.0', '23.0.0', '24.0.0', '25.2.0', '26.0.0']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Build in alpine
        run: |
          docker run --rm -v "$PWD:/work" -w /work node:22-alpine3.20 sh -c '
            apk add --no-cache python3 make g++ git &&
            npm ci --ignore-scripts --no-optional &&
            npm run prebuild:os -- --libc=musl ${{ matrix.node_api_target }}
          '
      - name: upload prebuilds
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: prebuilds-linux-musl-arm64-${{ matrix.node_api_target }}
          path: prebuilds

  prebuilds-macos-windows:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, macos-14]
        node_api_target: ['18.0.0', '20.0.0', '21.2.0', '22.0.0', '23.0.0', '24.0.0', '25.2.0', '26.0.0']
        # Node 25.x and 26.x require Xcode 16.4 (macOS >= 15.3) to build native addons.
        # See https://github.com/nodejs/node/blob/v25.x/BUILDING.md#macos-prerequisites
        # See https://github.com/nodejs/node/blob/v26.x/BUILDING.md#macos-prerequisites
        exclude:
          - os: macos-14
            node_api_target: '25.2.0'
          - os: macos-14
            node_api_target: '26.0.0'
        include:
          - os: macos-15
            node_api_target: '25.2.0'
          - os: macos-15
            node_api_target: '26.0.0'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: '3.11'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      - name: Prebuild
        run: npm run prebuild:os ${{ matrix.node_api_target }}
      - name: upload prebuilds
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: prebuilds-${{ matrix.os }}-${{ matrix.node_api_target }}
          path: prebuilds

  create-package:
    needs: [prebuilds-linux, prebuilds-linux-arm64, prebuilds-linux-musl, prebuilds-linux-musl-arm64, prebuilds-macos-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: '3.11'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      - name: Download all prebuilds
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: prebuilds-*
          path: allprebuilds
      - name: copy prebuilds
        run: |
          mkdir -p prebuilds
          cp -r allprebuilds/prebuilds-linux-arm64-*/* prebuilds
          cp -r allprebuilds/prebuilds-linux-musl-*/* prebuilds
          cp -r allprebuilds/prebuilds-linux-*/* prebuilds
          cp -r allprebuilds/prebuilds-windows-2022-*/* prebuilds
          cp -r allprebuilds/prebuilds-macos-14-*/* prebuilds
          cp -r allprebuilds/prebuilds-macos-15-*/* prebuilds
      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      - name: Build
        run: npm run compile
      - name: Pack
        id: pack
        run: |
          echo "::set-output name=package_file::$(npm pack)"
      - name: Upload package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.pack.outputs.package_file }}
          path: ${{ steps.pack.outputs.package_file }}

  create-workspace-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: '3.11'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      - name: Build workspace packages
        run: npm run compile:workspaces
      - name: Pack workspace packages
        id: pack
        run: |
          WS_PKGS="$(npm pack --workspaces --if-present)"
          {
            echo 'files<<EOF'
            echo "$WS_PKGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Upload workspace packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: workspace-packages
          path: ${{ steps.pack.outputs.files }}

  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'macos-latest']
        nodejs: ['18', '20', '21', '22', '23', '24', '25', '26']
        include:
          - os: 'macos-latest'
            python_version: '3.11'
          - os: 'windows-2022'
            nodejs: '18.20.1'
          - os: 'windows-2022'
            nodejs: '20.12.1'
          - os: 'windows-2022'
            nodejs: '21.7.2'
          - os: 'windows-2022'
            nodejs: '22.10.0'
          - os: 'windows-2022'
            nodejs: '23.0.0'
          - os: 'windows-2022'
            nodejs: '24.0.0'
          - os: 'windows-2022'
            nodejs: '25.2.0'
          - os: 'windows-2022'
            nodejs: '26.0.0'
    services:
      neo4j:
        image: ${{ (matrix.os == 'ubuntu-latest') && 'neo4j:4.4.42' || '' }}
        ports:
          - 11011:7687
        env:
          NEO4J_AUTH: neo4j/test_pw
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: ${{ matrix.python_version }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.nodejs }}
      - name: Install npm dependencies
        run: npm ci
      - name: Test
        run: npm run test
        env:
          NEO4J_TEST_WITH_LOCAL: ${{ (matrix.os == 'ubuntu-latest') && 'true' || 'false' }}
      - name: Report Coverage
        if: ${{matrix.nodejs == '22' && matrix.os == 'ubuntu-latest'}}
        uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457 # v3
        with:
          verbose: true

  unit-tests-arm64:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-24.04-arm']
        nodejs: ['18', '20', '21', '22', '23', '24', '25', '26']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: '3.11'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.nodejs }}
      - name: Install npm dependencies
        run: npm ci
      - name: Test
        run: npm run test

  workspaces-unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'macos-latest']
        nodejs: ['18', '20', '21', '22', '23', '24', '25', '26']
        include:
          - os: 'macos-latest'
            python_version: '3.11'
          - os: 'windows-2022'
            nodejs: '18.20.1'
          - os: 'windows-2022'
            nodejs: '20.12.1'
          - os: 'windows-2022'
            nodejs: '21.7.2'
          - os: 'windows-2022'
            nodejs: '22.10.0'
          - os: 'windows-2022'
            nodejs: '23.0.0'
          - os: 'windows-2022'
            nodejs: '24.0.0'
          - os: 'windows-2022'
            nodejs: '25.2.0'
          - os: 'windows-2022'
            nodejs: '26.0.0'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: ${{ matrix.python_version }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.nodejs }}
      - name: Install npm dependencies
        run: npm ci
      - name: Test workspace packages
        run: npm run test:workspaces
      - name: Report Coverage
        if: ${{matrix.nodejs == '22' && matrix.os == 'ubuntu-latest'}}
        uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457 # v3
        with:
          verbose: true

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      - name: Install npm dependencies
        run: npm ci
      - name: Build
        run: npm run compile:all
      - name: Generate metadata YAML
        run: node scripts/generate-metadata-yaml.js > splunk-otel-js-metadata.yaml
      - name: Upload metadata yaml
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: splunk-otel-js-metadata.yaml
          path: splunk-otel-js-metadata.yaml

  e2e-local:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ''
            name: 'Basic'
          - target: '-f esbuild-cjs.override.yml'
            name: 'ESBuild CJS'
          - target: '-f esbuild-esm.override.yml'
            name: 'ESBuild ESM'
          - target: '-f express.override.yml'
            name: 'Express'
          - target: '-f mixed.override.yml'
            name: 'Mixed'
          - target: '-f log-injection.override.yml'
            name: 'Log injection'
          - target: '-f profiling.override.yml'
            name: 'Profiling'
          - target: '-f typescript.override.yml'
            name: 'TypeScript'
    name: e2e local ${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Test ${{ matrix.name }} example
        working-directory: test/examples
        run: docker compose -f e2e.docker-compose.yml ${{ matrix.target }} up --exit-code-from test
