name: Continuous Integration
on:
  push:
  pull_request:
permissions: read-all

env:
  # https://github.com/actions/checkout/issues/1590
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  prebuilds-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        container: ['node:18.0.0']
        node_api_target: ['18.0.0', '20.0.0', '21.2.0', '22.0.0', '23.0.0', '24.0.0']
        include:
          - container: 'node:22.0.0'
            node_api_target: '25.2.0'
    container: ${{ matrix.container }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      - name: Install npm dependencies
        run: npm ci --ignore-scripts --no-optional
      - name: Prebuild
        run: npm run prebuild:os ${{ matrix.node_api_target }}
      - name: upload prebuilds
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prebuilds-linux-${{ matrix.node_api_target }}
          path: prebuilds

  prebuilds-linux-arm64:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        container: ['node:18.0.0']
        node_api_target: ['18.0.0', '20.0.0', '21.2.0', '22.0.0', '23.0.0', '24.0.0']
        include:
          - container: 'node:22.0.0'
            node_api_target: '25.2.0'
    container: ${{ matrix.container }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      - name: Install npm dependencies
        run: npm ci --ignore-scripts --no-optional
      - name: Prebuild
        run: npm run prebuild:os ${{ matrix.node_api_target }}
      - name: upload prebuilds
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prebuilds-linux-arm64-${{ matrix.node_api_target }}
          path: prebuilds

  prebuilds-macos-windows:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, macos-14, macos-15]
        node_api_target: ['18.0.0', '20.0.0', '21.2.0', '22.0.0', '23.0.0', '24.0.0']
        include:
          - os: macos-14
            python_version: '3.11'
          - os: macos-15
            python_version: '3.11'
          - os: 'macos-15'
            python_version: '3.11'
            node_api_target: '25.2.0'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python_version }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '18'
      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      - name: Prebuild
        run: npm run prebuild:os ${{ matrix.node_api_target }}
      - name: upload prebuilds
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prebuilds-${{ matrix.os }}-${{ matrix.node_api_target }}
          path: prebuilds

  create-package:
    needs: [prebuilds-linux, prebuilds-linux-arm64, prebuilds-macos-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '18'
      - name: Download all prebuilds
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: prebuilds-*
          path: allprebuilds
      - name: copy prebuilds
        run: |
          mkdir -p prebuilds
          cp -r allprebuilds/prebuilds-linux-arm64-*/* prebuilds
          cp -r allprebuilds/prebuilds-linux-*/* prebuilds
          cp -r allprebuilds/prebuilds-windows-2022-*/* prebuilds
          cp -r allprebuilds/prebuilds-macos-14-*/* prebuilds
          cp -r allprebuilds/prebuilds-macos-15-*/* prebuilds
      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      - name: Build
        run: npm run compile
      - name: Pack
        id: pack
        run: |
          echo "::set-output name=package_file::$(npm pack)"
      - name: Upload package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.pack.outputs.package_file }}
          path: ${{ steps.pack.outputs.package_file }}

  create-workspace-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '18'
      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      - name: Build workspace packages
        run: npm run compile:workspaces
      - name: Pack workspace packages
        id: pack
        run: |
          WS_PKGS="$(npm pack --workspaces --if-present)"
          {
            echo 'files<<EOF'
            echo "$WS_PKGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Upload workspace packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workspace-packages
          path: ${{ steps.pack.outputs.files }}

  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'macos-latest']
        nodejs: ['18', '20', '21', '22', '23', '24', '25']
        include:
          - os: 'macos-latest'
            python_version: '3.11'
          - os: 'windows-2022'
            nodejs: '18.20.1'
          - os: 'windows-2022'
            nodejs: '20.12.1'
          - os: 'windows-2022'
            nodejs: '21.7.2'
          - os: 'windows-2022'
            nodejs: '22.10.0'
          - os: 'windows-2022'
            nodejs: '23.0.0'
          - os: 'windows-2022'
            nodejs: '24.0.0'
          - os: 'windows-2022'
            nodejs: '25.2.0'
    services:
      neo4j:
        image: ${{ (matrix.os == 'ubuntu-latest') && 'neo4j:4.4.42' || '' }}
        ports:
          - 11011:7687
        env:
          NEO4J_AUTH: neo4j/test_pw
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python_version }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.nodejs }}
      - name: Install npm dependencies
        run: npm ci
      - name: Test
        run: npm run test
        env:
          NEO4J_TEST_WITH_LOCAL: ${{ (matrix.os == 'ubuntu-latest') && 'true' || 'false' }}
      - name: Report Coverage
        if: ${{matrix.nodejs == '22' && matrix.os == 'ubuntu-latest'}}
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          verbose: true

  unit-tests-arm64:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-24.04-arm']
        nodejs: ['18', '20', '21', '22', '23', '24', '25']
    container: node:${{ matrix.nodejs }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python_version }}
      - name: Install npm dependencies
        run: npm ci --unsafe-perm
      - name: Test
        run: npm run test

  workspaces-unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'macos-latest']
        nodejs: ['18', '20', '21', '22', '23', '24', '25']
        include:
          - os: 'macos-latest'
            python_version: '3.11'
          - os: 'windows-2022'
            nodejs: '18.20.1'
          - os: 'windows-2022'
            nodejs: '20.12.1'
          - os: 'windows-2022'
            nodejs: '21.7.2'
          - os: 'windows-2022'
            nodejs: '22.10.0'
          - os: 'windows-2022'
            nodejs: '23.0.0'
          - os: 'windows-2022'
            nodejs: '24.0.0'
          - os: 'windows-2022'
            nodejs: '25.2.0'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python_version }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.nodejs }}
      - name: Install npm dependencies
        run: npm ci
      - name: Test workspace packages
        run: npm run test:workspaces
      - name: Report Coverage
        if: ${{matrix.nodejs == '22' && matrix.os == 'ubuntu-latest'}}
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          verbose: true

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 18
      - name: Install npm dependencies
        run: npm ci
      - name: Build
        run: npm run compile:all
      - name: Generate metadata YAML
        run: node scripts/generate-metadata-yaml.js > splunk-otel-js-metadata.yaml
      - name: Upload metadata yaml
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: splunk-otel-js-metadata.yaml
          path: splunk-otel-js-metadata.yaml

  e2e-local:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ''
            name: 'Basic'
          - target: '-f esbuild-cjs.override.yml'
            name: 'ESBuild CJS'
          - target: '-f esbuild-esm.override.yml'
            name: 'ESBuild ESM'
          - target: '-f express.override.yml'
            name: 'Express'
          - target: '-f mixed.override.yml'
            name: 'Mixed'
          - target: '-f log-injection.override.yml'
            name: 'Log injection'
          - target: '-f profiling.override.yml'
            name: 'Profiling'
          - target: '-f typescript.override.yml'
            name: 'TypeScript'
    name: e2e local ${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test ${{ matrix.name }} example
        working-directory: test/examples
        run: docker compose -f e2e.docker-compose.yml ${{ matrix.target }} up --exit-code-from test
